<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess the Song!</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
            background-color: #282c34;
            color: white;
            margin-top: 50px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
        }
        input[type="file"] {
            margin: 20px 0;
            padding: 10px;
            background: #3a3f4b;
            border-radius: 5px;
            border: 1px dashed #61dafb;
            color: white;
            cursor: pointer;
        }
        button {
            padding: 15px 25px;
            font-size: 18px;
            margin: 10px;
            cursor: pointer;
            background-color: #61dafb;
            border: none;
            border-radius: 5px;
            font-weight: bold;
            color: #282c34;
        }
        button:disabled {
            background-color: #555;
            cursor: not-allowed;
            color: #888;
        }
        #answerDisplay {
            font-size: 24px;
            margin-top: 30px;
            font-weight: bold;
            color: #98c379;
        }
        .game-controls {
            display: none; /* Hidden until songs are loaded */
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🎵 Dynamic Guess the Song Game! 🎵</h1>
        <p>Step 1: Upload your renamed song files below. They stay entirely on your computer!</p>
        
        <input type="file" id="songUpload" multiple accept="audio/*">

        <div id="gameControls" class="game-controls">
            <p>Step 2: Play and guess!</p>
            <button id="playBtn">▶️ Play Random Song</button>
            <button id="revealBtn" disabled>👀 Reveal Answer</button>
        </div>

        <div id="answerDisplay"></div>
    </div>

    <audio id="audioPlayer"></audio>

    <script src="script.js"></script>
</body>
</html>
